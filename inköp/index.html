<style>

    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);

    padding: 32px 24px 60px;

  header {

    gap: 16px;

    font-size: 11px;

    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }

  h1 {
    font-family: var(--display);
    font-weight: 300;
    font-size: clamp(2.4rem, 5vw, 3.6rem);
    line-height: 0.95;
    letter-spacing: -0.02em;

  h1 em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);

    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--line);
    border-radius: 999px;
    font-family: var(--body);
    font-size: 12px;
    font-weight: 600;
    color: var(--ink-soft);
    text-decoration: none;
    transition: all 0.15s;

  .nav-back:hover { border-color: var(--ink); color: var(--ink); }

  .sync-status {
    display: inline-flex;
    align-items: center;

    padding: 6px 12px;
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;

    width: 8px;

  }

    0% { box-shadow: 0 0 0 0 rgba(76, 175, 80, 0.5); }

    width: 100%;
  }

  .add-form .person-row {

    gap: 6px;
    margin-top: 8px;
  }

  .person-btn {

    padding: 10px;
    border: 1px solid var(--line);
    background: white;
    border-radius: 10px;
    cursor: pointer;
    font-family: var(--body);
    font-size: 13px;
    font-weight: 600;
    color: var(--ink-soft);

  .add-form .bottom-row {
    display: flex;
    gap: 8px;
    margin-top: 10px;
    align-items: center;
  }

  .photo-btn {
    background: white;
    border: 1px solid var(--line);
    border-radius: 10px;
    cursor: pointer;
    padding: 10px;
    min-height: 44px;
    min-width: 44px;
    font-size: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--ink-soft);
    transition: all 0.15s;
  }

  .photo-btn:hover { color: var(--accent); border-color: var(--accent); }
  .photo-btn.has-photo { background: var(--mat-light); border-color: var(--mat); color: var(--mat); }

  .add-btn {
    flex: 1;
    min-height: 44px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-family: var(--body);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.05em;
    transition: background 0.2s;
  }

  .add-btn:hover { background: var(--accent-deep); }

  .photo-preview {
    margin-top: 8px;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px;
    background: var(--mat-light);
    border-radius: 10px;
    font-size: 12px;
    color: var(--mat);
    font-weight: 600;
  }

  .photo-preview img {
    width: 40px;
    height: 40px;
    object-fit: cover;
    border-radius: 6px;
  }

  .photo-preview button {
    margin-left: auto;
    background: transparent;
    border: none;
    color: var(--mat);
    cursor: pointer;
    font-size: 18px;
    padding: 4px 8px;
  }
</style>

  <header>
    <div>
      <span class="eyebrow">Familjen Reis</span>

      <button class="photo-btn" id="photoBtn" title="Lägg till bild">📷</button>

      <span>Att handla <span id="activeCount" style="color:var(--ink);">(0)</span></span>
      <button class="section-action hidden" id="clearChecked">Rensa avbockade</button>

      <div class="list-empty">
        <div class="display">Tom lista</div>
        <div style="font-size:13px;">Skriv något i fältet ovan</div>

    <div class="history-title">Senast köpta</div>
    <div class="history-sub">Klicka för att lägga till igen</div>

<div class="modal-overlay" id="imageModal">
  <button class="image-modal-close" id="imageModalClose">×</button>
  <div class="image-modal">
    <img id="imageModalImg" alt="">
  </div>

  <div class="modal-card" id="actionModalCard"></div>

<div class="toast" id="toast">Tillagd</div>

<script>
 let state = {
    activeList: 'mat',
    items: [],
    history: [],
    pendingPhoto: null,
    selectedPerson: 'bada'
  };

  let itemsRef = null;
  let historyRef = null;
  let suppressUpdate = false;
  const FALLBACK_ITEMS = 'inkop_items_fallback';
  const FALLBACK_HIST = 'inkop_history_fallback';

  function getItemsRef() {
    if (itemsRef) return itemsRef;
    if (window.firebaseReady && window.db) {
      itemsRef = window.db.ref('shopping/items');
      return itemsRef;
    }
    return null;
  }

  function getHistoryRef() {
    if (historyRef) return historyRef;
    if (window.firebaseReady && window.db) {
      historyRef = window.db.ref('shopping/history');
      return historyRef;
    }
    return null;
  }

  async function loadData() {
    const ir = getItemsRef();
    const hr = getHistoryRef();

    if (!ir) {
      try { state.items = JSON.parse(localStorage.getItem(FALLBACK_ITEMS) || '[]'); } catch(e) { state.items = []; }
      try { state.history = JSON.parse(localStorage.getItem(FALLBACK_HIST) || '[]'); } catch(e) { state.history = []; }
      return;
    }

    return new Promise((resolve) => {
      ir.once('value').then(snap => {
        const data = snap.val();
        state.items = data ? Object.values(data) : [];
        ir.on('value', (s) => {
          if (suppressUpdate) return;
          const d = s.val();
          state.items = d ? Object.values(d) : [];
          render();
        });
        if (hr) {
          hr.once('value').then(hsnap => {
            state.history = hsnap.val() ? Object.values(hsnap.val()) : [];
            hr.on('value', (s) => {
              if (suppressUpdate) return;
              state.history = s.val() ? Object.values(s.val()) : [];
              renderHistory();
            });
            resolve();
          });
        } else resolve();
      }).catch(err => { console.error(err); state.items = []; resolve(); });
    });
  }

  async function saveItem(item) {
    const idx = state.items.findIndex(e => e.id === item.id);
    if (idx === -1) state.items.push(item); else state.items[idx] = item;
    const ref = getItemsRef();
    if (!ref) {
      try { localStorage.setItem(FALLBACK_ITEMS, JSON.stringify(state.items)); } catch(e) {}
      return;
    }
    try {
      suppressUpdate = true;
      await ref.child(item.id).set(item);
      setTimeout(() => { suppressUpdate = false; }, 500);
    } catch (e) { console.error(e); suppressUpdate = false; }
  }

  async function deleteItem(id) {
    state.items = state.items.filter(e => e.id !== id);
    const ref = getItemsRef();
    if (!ref) {
      try { localStorage.setItem(FALLBACK_ITEMS, JSON.stringify(state.items)); } catch(e) {}
      return;
    }
    try {
      suppressUpdate = true;
      await ref.child(id).remove();
      setTimeout(() => { suppressUpdate = false; }, 500);
    } catch (e) { console.error(e); suppressUpdate = false; }
  }

  async function addToHistory(name, list) {
    state.history = state.history.filter(h => !(h.name.toLowerCase() === name.toLowerCase() && h.list === list));
    const entry = {
      id: 'h-' + list + '-' + name.toLowerCase().replace(/[^a-z0-9]/g, '-').slice(0, 40),
      name, list,
      lastUsed: Date.now()
    };
    state.history.unshift(entry);
    const perList = {};
    state.history.forEach(h => {
      if (!perList[h.list]) perList[h.list] = [];
      if (perList[h.list].length < 30) perList[h.list].push(h);
    });
    state.history = [].concat(...Object.values(perList));

    const ref = getHistoryRef();
    if (!ref) {
      try { localStorage.setItem(FALLBACK_HIST, JSON.stringify(state.history)); } catch(e) {}
      return;
    }
    try {
      suppressUpdate = true;
      await ref.child(entry.id).set(entry);
      setTimeout(() => { suppressUpdate = false; }, 500);
    } catch (e) { console.error(e); suppressUpdate = false; }
  }

  // IMAGE COMPRESSION + UPLOAD
  function compressImage(file, maxWidth = 800) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > maxWidth) { h = h * (maxWidth / w); w = maxWidth; }
          canvas.width = w;
          canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob(resolve, 'image/jpeg', 0.75);
        };
        img.onerror = reject;
        img.src = e.target.result;
      };
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function uploadImage(blob, itemId) {
    if (!window.firebaseReady || !window.storage) {
      throw new Error('Storage not available');
    }
    const path = `items/${itemId}.jpg`;
    const ref = window.storage.ref(path);
    await ref.put(blob);
    return await ref.getDownloadURL();
  }

  function setupSyncStatus() {
    const statusEl = document.getElementById('syncStatus');
    const textEl = statusEl.querySelector('.sync-text');
    if (window.firebaseFailed || !window.firebaseReady) {
      statusEl.classList.add('offline');
      textEl.textContent = 'Offline (lokalt)';
      return;
    }
    const connectedRef = window.db.ref('.info/connected');
    connectedRef.on('value', (snap) => {
      if (snap.val() === true) {
        statusEl.classList.remove('offline');
        textEl.textContent = 'Synkad';
      } else {
        statusEl.classList.add('offline');
        textEl.textContent = 'Offline';
      }
    });
  }

  function render() {
    renderTabs();
    renderForm();
    renderItems();
    renderHistory();
  }

  function renderTabs() {
    ['mat','ovrigt','barnen'].forEach(list => {
      const unchecked = state.items.filter(i => i.list === list && !i.checked).length;
      const el = document.getElementById('count' + list.charAt(0).toUpperCase() + list.slice(1));
      if (el) {
        el.textContent = unchecked;
        el.classList.toggle('zero', unchecked === 0);
      }
    });
  }

  function renderForm() {
    const addRow = document.getElementById('addRow');
    const personRow = document.getElementById('personRow');
    const commentRow = document.getElementById('commentRow');
    const unitSelect = document.getElementById('itemUnit');
    const commentInput = document.getElementById('itemComment');

    if (state.activeList === 'barnen') {
      addRow.classList.add('barnen-row');
      personRow.classList.remove('hidden');
      commentRow.classList.remove('hidden');
      commentInput.placeholder = 'Storlek, modell, märke...';
      unitSelect.innerHTML = '<option value="st" selected>st</option>';
    } else if (state.activeList === 'ovrigt') {
      addRow.classList.remove('barnen-row');
      personRow.classList.add('hidden');
      commentRow.classList.remove('hidden');
      commentInput.placeholder = 'Detaljer, till vem, etc...';
      unitSelect.innerHTML = `
        <option value="">enhet</option>
        <option value="st">st</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="paket">paket</option>
        <option value="påse">påse</option>
        <option value="burk">burk</option>
        <option value="flaska">flaska</option>
      `;
    } else {
      addRow.classList.remove('barnen-row');
      personRow.classList.add('hidden');
      commentRow.classList.add('hidden');
      unitSelect.innerHTML = `
        <option value="">enhet</option>
        <option value="st">st</option>
        <option value="kg">kg</option>
        <option value="g">g</option>
        <option value="hg">hg</option>
        <option value="liter">liter</option>
        <option value="dl">dl</option>
        <option value="cl">cl</option>
        <option value="ml">ml</option>
        <option value="paket">paket</option>
        <option value="påse">påse</option>
        <option value="burk">burk</option>
        <option value="flaska">flaska</option>
      `;
    }
  }

  function renderItems() {
    const container = document.getElementById('itemsContainer');
    const activeCount = document.getElementById('activeCount');
    const clearBtn = document.getElementById('clearChecked');

    const items = state.items.filter(i => i.list === state.activeList);
    items.sort((a, b) => {
      if (a.checked !== b.checked) return a.checked ? 1 : -1;
      return (b.created || 0) - (a.created || 0);
    });

    const uncheckedCount = items.filter(i => !i.checked).length;
    const checkedCount = items.filter(i => i.checked).length;
    activeCount.textContent = `(${uncheckedCount})`;
    clearBtn.classList.toggle('hidden', checkedCount === 0);

    if (items.length === 0) {
      container.innerHTML = `<div class="list-empty"><div class="display">Tom lista</div><div style="font-size:13px;">Lägg till något ovan</div></div>`;
      return;
    }

    container.innerHTML = '';
    items.forEach(item => {
      const row = document.createElement('div');
      row.className = `item list-${item.list}` + (item.checked ? ' checked' : '');

      const check = document.createElement('div');
      check.className = 'checkbox';
      check.addEventListener('click', (e) => { e.stopPropagation(); toggleChecked(item); });
      row.appendChild(check);

      if (item.imageUrl) {
        const thumb = document.createElement('img');
        thumb.className = 'item-thumb';
        thumb.src = item.imageUrl;
        thumb.alt = item.name;
        thumb.addEventListener('click', (e) => { e.stopPropagation(); openImageModal(item.imageUrl); });
        row.appendChild(thumb);
      }

      const body = document.createElement('div');
      body.className = 'item-body';
      body.addEventListener('click', () => toggleChecked(item));

      const nameRow = document.createElement('div');
      nameRow.className = 'item-name-row';
      const name = document.createElement('span');
      name.className = 'item-name';
      name.textContent = item.name;
      nameRow.appendChild(name);

      if (item.qty) {
        const qty = document.createElement('span');
        qty.className = 'item-qty';
        qty.textContent = item.qty;
        nameRow.appendChild(qty);
      }

      if (item.list === 'barnen' && item.person) {
        const pTag = document.createElement('span');
        pTag.className = `item-person-tag person-${item.person}`;
        pTag.textContent = item.person === 'bada' ? 'Båda' : item.person.charAt(0).toUpperCase() + item.person.slice(1);
        nameRow.appendChild(pTag);
      }

      body.appendChild(nameRow);

      if (item.comment) {
        const c = document.createElement('div');
        c.className = 'item-comment';
        c.textContent = item.comment;
        body.appendChild(c);
      }

      row.appendChild(body);

      const actions = document.createElement('div');
      actions.className = 'item-actions';

      const edit = document.createElement('button');
      edit.className = 'icon-btn edit-btn';
      edit.innerHTML = '✎';
      edit.title = 'Redigera';
      edit.addEventListener('click', (e) => { e.stopPropagation(); openEditModal(item); });
      actions.appendChild(edit);

      const del = document.createElement('button');
      del.className = 'icon-btn delete-btn';
      del.innerHTML = '×';
      del.title = 'Ta bort';
      del.addEventListener('click', async (e) => {
        e.stopPropagation();
        await deleteItem(item.id);
        render();
      });
      actions.appendChild(del);
      row.appendChild(actions);

      container.appendChild(row);
    });
  }

  function renderHistory() {
    const container = document.getElementById('historyChips');
    const section = document.getElementById('historySection');

    const historyForList = state.history
      .filter(h => h.list === state.activeList)
      .sort((a, b) => (b.lastUsed || 0) - (a.lastUsed || 0))
      .slice(0, 20);

    const activeNames = state.items
      .filter(i => i.list === state.activeList && !i.checked)
      .map(i => i.name.toLowerCase());

    const available = historyForList.filter(h => !activeNames.includes(h.name.toLowerCase()));

    if (available.length === 0) {
      section.style.display = 'none';
      return;
    }
    section.style.display = '';

    container.innerHTML = '';
    available.forEach(h => {
      const chip = document.createElement('button');
      chip.className = 'history-chip';
      chip.textContent = h.name;
      chip.addEventListener('click', () => openHistoryAddModal(h));
      container.appendChild(chip);
    });
  }

  // ADD ITEM
  async function addItem({ name, qty, list, comment, person, imageUrl }) {
    name = name.trim();
    if (!name) return;
    list = list || state.activeList;

    // Check for duplicate (same name in same list, not checked)
    const existing = state.items.find(i =>
      i.list === list &&
      !i.checked &&
      i.name.toLowerCase() === name.toLowerCase()
    );

    if (existing) {
      const merge = confirm(`"${name}" finns redan i listan med mängd "${existing.qty || 'ingen'}".\n\nVill du SLÅ IHOP (uppdatera mängd) eller lägga till SEPARAT?\n\nOK = Slå ihop\nAvbryt = Lägg till separat`);
      if (merge) {
        existing.qty = qty || existing.qty;
        if (comment) existing.comment = comment;
        if (imageUrl) existing.imageUrl = imageUrl;
        if (person) existing.person = person;
        await saveItem(existing);
        render();
        showToast(`"${name}" uppdaterad`);
        return;
      }
    }

    const item = {
      id: Date.now().toString() + Math.random().toString(36).slice(2, 7),
      name,
      qty: qty || '',
      list,
      comment: comment || '',
      person: person || '',
      imageUrl: imageUrl || '',
      checked: false,
      created: Date.now()
    };
    await saveItem(item);
    render();
    showToast(`"${name}" tillagd`);
  }

  async function toggleChecked(item) {
    item.checked = !item.checked;
    if (item.checked) {
      await addToHistory(item.name, item.list);
    }
    await saveItem(item);
    render();
  }

  async function clearChecked() {
    const checked = state.items.filter(i => i.list === state.activeList && i.checked);
    if (checked.length === 0) return;
    if (!confirm(`Ta bort ${checked.length} avbockade?`)) return;
    for (const item of checked) {
      await deleteItem(item.id);
    }
    render();
    showToast(`${checked.length} st rensade`);
  }

  // EDIT MODAL
  function openEditModal(item) {
    const card = document.getElementById('actionModalCard');
    const unitsForList = item.list === 'barnen' ? ['st'] : ['', 'st', 'kg', 'g', 'hg', 'liter', 'dl', 'cl', 'ml', 'paket', 'påse', 'burk', 'flaska'];

    // Parse current qty to number + unit
    let curNum = '', curUnit = '';
    if (item.qty) {
      const m = item.qty.match(/^([\d.,]+)\s*(.*)$/);
      if (m) { curNum = m[1]; curUnit = m[2].trim(); }
      else { curUnit = item.qty; }
    }

    const personHtml = item.list === 'barnen' ? `
      <div class="form-row">
        <label>Vem?</label>
        <div style="display:flex;gap:6px;">
          <button type="button" class="person-btn person-george ${item.person === 'george' ? 'active' : ''}" data-edit-person="george">George</button>
          <button type="button" class="person-btn person-bob ${item.person === 'bob' ? 'active' : ''}" data-edit-person="bob">Bob</button>
          <button type="button" class="person-btn person-bada ${item.person === 'bada' ? 'active' : ''}" data-edit-person="bada">Båda</button>
        </div>
      </div>
    ` : '';

    const commentHtml = (item.list === 'barnen' || item.list === 'ovrigt') ? `
      <div class="form-row">
        <label>Kommentar</label>
        <input type="text" id="editComment" value="${(item.comment || '').replace(/"/g, '&quot;')}">
      </div>
    ` : '';

    card.innerHTML = `
      <h3>Redigera</h3>
      <p>${item.name}</p>
      <div class="form-row">
        <label>Namn</label>
        <input type="text" id="editName" value="${item.name.replace(/"/g, '&quot;')}">
      </div>
      <div class="form-row" style="display:grid;grid-template-columns:80px 1fr;gap:8px;">
        <div>
          <label>Antal</label>
          <input type="number" id="editQty" value="${curNum}" min="0" step="0.5">
        </div>
        <div>
          <label>Enhet</label>
          <select id="editUnit">
            ${unitsForList.map(u => `<option value="${u}" ${u === curUnit ? 'selected' : ''}>${u || 'enhet'}</option>`).join('')}
          </select>
        </div>
      </div>
      ${personHtml}
      ${commentHtml}
      <div class="modal-buttons">
        <button class="btn-secondary" id="editCancel">Avbryt</button>
        <button class="btn-primary" id="editSave">Spara</button>
      </div>
    `;

    document.getElementById('actionModal').classList.add('show');
    document.body.style.overflow = 'hidden';

    let editPerson = item.person || '';
    card.querySelectorAll('[data-edit-person]').forEach(btn => {
      btn.addEventListener('click', () => {
        card.querySelectorAll('[data-edit-person]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        editPerson = btn.dataset.editPerson;
      });
    });

    document.getElementById('editCancel').addEventListener('click', closeActionModal);
    document.getElementById('editSave').addEventListener('click', async () => {
      const newName = document.getElementById('editName').value.trim();
      if (!newName) return;
      const newNum = document.getElementById('editQty').value.trim();
      const newUnit = document.getElementById('editUnit').value;
      let newQty = '';
      if (newNum && newUnit) newQty = `${newNum} ${newUnit}`;
      else if (newNum) newQty = newNum;
      else if (newUnit) newQty = newUnit;

      item.name = newName;
      item.qty = newQty;
      if (item.list === 'barnen') item.person = editPerson;
      if (item.list === 'barnen' || item.list === 'ovrigt') {
        const c = document.getElementById('editComment');
        if (c) item.comment = c.value.trim();
      }
      await saveItem(item);
      closeActionModal();
      render();
      showToast('Sparat');
    });
  }

  // HISTORY ADD MODAL
  function openHistoryAddModal(historyEntry) {
    const card = document.getElementById('actionModalCard');
    const list = historyEntry.list;
    const unitsForList = list === 'barnen' ? ['st'] : ['', 'st', 'kg', 'g', 'hg', 'liter', 'dl', 'cl', 'ml', 'paket', 'påse', 'burk', 'flaska'];

    const personHtml = list === 'barnen' ? `
      <div class="form-row">
        <label>Vem?</label>
        <div style="display:flex;gap:6px;">
          <button type="button" class="person-btn person-george" data-hist-person="george">George</button>
          <button type="button" class="person-btn person-bob" data-hist-person="bob">Bob</button>
          <button type="button" class="person-btn person-bada active" data-hist-person="bada">Båda</button>
        </div>
      </div>
    ` : '';

    const commentHtml = (list === 'barnen' || list === 'ovrigt') ? `
      <div class="form-row">
        <label>Kommentar</label>
        <input type="text" id="histComment" placeholder="${list === 'barnen' ? 'Storlek, modell...' : 'Detaljer, till vem...'}">
      </div>
    ` : '';

    card.innerHTML = `
      <h3>Lägg till igen</h3>
      <p>${historyEntry.name}</p>
      <div class="form-row" style="display:grid;grid-template-columns:80px 1fr;gap:8px;">
        <div>
          <label>Antal</label>
          <input type="number" id="histQty" min="0" step="0.5" placeholder="${list === 'barnen' ? '1' : ''}">
        </div>
        <div>
          <label>Enhet</label>
          <select id="histUnit">
            ${unitsForList.map(u => `<option value="${u}">${u || 'enhet'}</option>`).join('')}
          </select>
        </div>
      </div>
      ${personHtml}
      ${commentHtml}
      <div class="modal-buttons">
        <button class="btn-secondary" id="histCancel">Avbryt</button>
        <button class="btn-primary" id="histAdd">Lägg till</button>
      </div>
    `;

    document.getElementById('actionModal').classList.add('show');
    document.body.style.overflow = 'hidden';

    let histPerson = 'bada';
    card.querySelectorAll('[data-hist-person]').forEach(btn => {
      btn.addEventListener('click', () => {
        card.querySelectorAll('[data-hist-person]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        histPerson = btn.dataset.histPerson;
      });
    });

    document.getElementById('histCancel').addEventListener('click', closeActionModal);
    document.getElementById('histAdd').addEventListener('click', async () => {
      const num = document.getElementById('histQty').value.trim();
      const unit = document.getElementById('histUnit').value;
      let qty = '';
      if (num && unit) qty = `${num} ${unit}`;
      else if (num) qty = num;
      else if (unit) qty = unit;

      const c = document.getElementById('histComment');
      const comment = c ? c.value.trim() : '';

      closeActionModal();
      await addItem({
        name: historyEntry.name,
        qty,
        list,
        comment,
        person: list === 'barnen' ? histPerson : ''
      });
    });

    setTimeout(() => document.getElementById('histQty').focus(), 100);
  }

  function closeActionModal() {
    document.getElementById('actionModal').classList.remove('show');
    document.body.style.overflow = '';
  }

  // IMAGE MODAL
  function openImageModal(url) {
    document.getElementById('imageModalImg').src = url;
    document.getElementById('imageModal').classList.add('show');
    document.body.style.overflow = 'hidden';
  }

  function closeImageModal() {
    document.getElementById('imageModal').classList.remove('show');
    document.body.style.overflow = '';
  }

  // TOAST
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.innerHTML = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
  }

  // EVENT LISTENERS
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      state.activeList = tab.dataset.list;
      // Reset form when switching
      document.getElementById('itemName').value = '';
      document.getElementById('itemQty').value = '';
      document.getElementById('itemComment').value = '';
      state.pendingPhoto = null;
      document.getElementById('photoPreview').classList.add('hidden');
      document.getElementById('photoBtn').classList.remove('has-photo');
      state.selectedPerson = 'bada';
      document.querySelectorAll('.person-btn').forEach(b => b.classList.remove('active'));
      const badaBtn = document.querySelector('[data-person="bada"]');
      if (badaBtn) badaBtn.classList.add('active');
      render();
    });
  });

  document.querySelectorAll('.person-row .person-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.person-row .person-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      state.selectedPerson = btn.dataset.person;
    });
  });

  // PHOTO upload
  document.getElementById('photoBtn').addEventListener('click', () => {
    document.getElementById('photoInput').click();
  });

  document.getElementById('photoInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    try {
      showToast('<span class="upload-spinner"></span>Komprimerar bild...');
      const blob = await compressImage(file);
      const previewUrl = URL.createObjectURL(blob);
      state.pendingPhoto = blob;
      document.getElementById('photoPreviewImg').src = previewUrl;
      document.getElementById('photoPreviewText').textContent = 'Bild klar';
      document.getElementById('photoPreview').classList.remove('hidden');
      document.getElementById('photoBtn').classList.add('has-photo');
      showToast('Bild redo att laddas upp');
    } catch (err) {
      console.error(err);
      showToast('Kunde inte bearbeta bilden');
    }
    e.target.value = '';
  });

  document.getElementById('photoPreviewRemove').addEventListener('click', () => {
    state.pendingPhoto = null;
    document.getElementById('photoPreview').classList.add('hidden');
    document.getElementById('photoBtn').classList.remove('has-photo');
  });

  document.getElementById('addBtn').addEventListener('click', async () => {
    const name = document.getElementById('itemName').value;
    if (!name.trim()) { document.getElementById('itemName').focus(); return; }

    const num = document.getElementById('itemQty').value.trim();
    const unit = document.getElementById('itemUnit').value;
    let qty = '';
    if (num && unit) qty = `${num} ${unit}`;
    else if (num) qty = num;
    else if (unit) qty = unit;

    const comment = document.getElementById('itemComment').value.trim();
    const person = state.activeList === 'barnen' ? state.selectedPerson : '';

    // Upload photo if any
    let imageUrl = '';
    if (state.pendingPhoto) {
      const tempId = Date.now().toString() + Math.random().toString(36).slice(2, 7);
      try {
        showToast('<span class="upload-spinner"></span>Laddar upp bild...');
        imageUrl = await uploadImage(state.pendingPhoto, tempId);
      } catch (err) {
        console.error('Image upload failed', err);
        showToast('Bilduppladdning misslyckades, sparar utan bild');
      }
    }

    await addItem({ name, qty, list: state.activeList, comment, person, imageUrl });

    // Reset form
    document.getElementById('itemName').value = '';
    document.getElementById('itemQty').value = '';
    document.getElementById('itemComment').value = '';
    state.pendingPhoto = null;
    document.getElementById('photoPreview').classList.add('hidden');
    document.getElementById('photoBtn').classList.remove('has-photo');
    document.getElementById('itemName').focus();
  });

  ['itemName', 'itemQty', 'itemComment'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); document.getElementById('addBtn').click(); }
    });
  });

  document.getElementById('clearChecked').addEventListener('click', clearChecked);

  document.getElementById('imageModalClose').addEventListener('click', closeImageModal);
  document.getElementById('imageModal').addEventListener('click', (e) => {
    if (e.target.id === 'imageModal') closeImageModal();
  });

  document.getElementById('actionModal').addEventListener('click', (e) => {
    if (e.target.id === 'actionModal') closeActionModal();
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (document.getElementById('imageModal').classList.contains('show')) closeImageModal();
      else if (document.getElementById('actionModal').classList.contains('show')) closeActionModal();
    }
  });

  // BOOT
  (async () => {
    setupSyncStatus();
    render();
    await loadData();
    render();
  })();
</script>

</body>
</html>
