<style>
  :root {
    --bg: #f4efe6;
    --bg-card: #fbf8f1;
    --ink: #1a1a1a;
    --ink-soft: #5a5550;
    --line: #d9d2c2;
    --accent: #c44536;
    --accent-deep: #8b2e23;
    --p1: #2d5a4f; --p1-light: #d4e3dd;
    --p2: #c44536; --p2-light: #f4d6cf;
    --p3: #d4a574; --p3-light: #f5e8d4;
    --p4: #4a6fa5; --p4-light: #d6e0ed;
    --p5: #8b5cf6; --p5-light: #e0d6ed;
    --familj: #6b4e8b; --familj-light: #e0d6ed;
    --display: 'Fraunces', Georgia, serif;
    --body: 'Inter Tight', system-ui, sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--body);
    background: var(--bg);
    color: var(--ink);
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    padding-bottom: 40px;
  }

  .hidden { display: none !important; }

  input, select, button, textarea {
    font-family: var(--body);
    font-size: 16px;
  }

  /* ---------- LOGIN ---------- */
  .login-wrap {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 24px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
    box-shadow: 0 12px 40px rgba(0,0,0,0.06);
  }
  .login-logo {
    width: 120px; height: 120px;
    border-radius: 28px;
    object-fit: cover;
    margin: 0 auto 20px;
    display: block;
    box-shadow: 0 8px 24px rgba(0,0,0,0.08);
    background: #fff;
  }
  .login-card h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 38px;
    line-height: 1.05;
    margin-bottom: 6px;
  }
  .login-card h1 em { color: var(--accent); font-style: italic; }
  .login-tagline {
    font-family: var(--display);
    font-style: italic;
    color: var(--ink-soft);
    margin-bottom: 28px;
  }
  .login-card label {
    display: block;
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--ink-soft);
    margin-bottom: 8px;
  }
  .login-card input {
    width: 100%;
    padding: 14px 16px;
    border: 1px solid var(--line);
    border-radius: 12px;
    background: #fff;
    margin-bottom: 16px;
  }
  .login-card input:focus { outline: none; border-color: var(--accent); }
  .btn-primary {
    width: 100%;
    padding: 15px;
    border: none;
    border-radius: 12px;
    background: var(--accent);
    color: #fff;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s;
  }
  .btn-primary:hover { background: var(--accent-deep); }
  .login-help { margin-top: 18px; font-size: 13px; color: var(--ink-soft); }
  .login-error { color: var(--accent); font-size: 13px; margin-bottom: 12px; min-height: 18px; }

  /* ---------- APP ---------- */
  .wrap { max-width: 760px; margin: 0 auto; padding: 0 20px; }

  header {
    padding: 28px 0 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img { width: 56px; height: 56px; border-radius: 14px; object-fit: cover; background: #fff; }
  .eyebrow {
    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--ink-soft);
  }
  .brand h1 {
    font-family: var(--display);
    font-weight: 400;
    font-size: 30px;
    line-height: 1;
  }
  .brand h1 em { color: var(--accent); font-style: italic; }
  .header-right { display: flex; align-items: center; gap: 10px; }

  .sync-status {
    display: inline-flex; align-items: center; gap: 7px;
    font-size: 12px; color: var(--ink-soft);
    padding: 7px 12px; border: 1px solid var(--line); border-radius: 999px;
    background: var(--bg-card);
  }
  .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: #cfc8ba; transition: background 0.3s; }
  .sync-dot.on { background: #4caf7d; }

  .nav-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 10px 16px;
    border: none; border-radius: 999px;
    background: var(--ink); color: #fff;
    font-weight: 600; font-size: 14px;
    text-decoration: none; cursor: pointer;
  }
  .nav-btn:hover { background: #000; }

  .card {
    background: var(--bg-card);
    border: 1px solid var(--line);
    border-radius: 20px;
    padding: 22px;
    margin-bottom: 22px;
  }
  .card-title {
    font-family: var(--display);
    font-weight: 400;
    font-size: 22px;
    margin-bottom: 16px;
  }

  /* Add form */
  .add-row { display: flex; gap: 10px; margin-bottom: 14px; }
  .add-row input.item-name {
    flex: 1;
    padding: 13px 15px;
    border: 1px solid var(--line); border-radius: 12px; background: #fff;
  }
  .add-row input.item-qty {
    width: 90px;
    padding: 13px 12px;
    border: 1px solid var(--line); border-radius: 12px; background: #fff;
  }
  .add-row input:focus { outline: none; border-color: var(--accent); }

  .field-label {
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--ink-soft); margin-bottom: 8px;
  }

  .cat-picker, .person-picker {
    display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px;
  }
  .chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 13px;
    border: 1px solid var(--line); border-radius: 999px;
    background: #fff; cursor: pointer; font-size: 13px; font-weight: 500;
    transition: all 0.12s; user-select: none;
  }
  .chip:hover { border-color: var(--ink); }
  .chip.selected { background: var(--ink); color: #fff; border-color: var(--ink); }
  .chip .dot { width: 9px; height: 9px; border-radius: 50%; }

  .add-btn {
    width: 100%; padding: 14px; border: none; border-radius: 12px;
    background: var(--accent); color: #fff; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer;
  }
  .add-btn:hover { background: var(--accent-deep); }

  /* List */
  .cat-group { margin-bottom: 20px; }
  .cat-group:last-child { margin-bottom: 0; }
  .cat-head {
    display: flex; align-items: center; gap: 8px;
    font-weight: 600; font-size: 13px; letter-spacing: 0.04em;
    color: var(--ink-soft); text-transform: uppercase;
    padding-bottom: 8px; margin-bottom: 6px;
    border-bottom: 1px solid var(--line);
  }
  .item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 4px;
    border-bottom: 1px solid #ece6d9;
  }
  .item:last-child { border-bottom: none; }
  .check {
    width: 24px; height: 24px; min-width: 24px;
    border: 2px solid var(--line); border-radius: 50%;
    cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-size: 14px;
  }
  .check:hover { border-color: var(--accent); }
  .item-main { flex: 1; min-width: 0; }
  .item-name-txt { font-weight: 500; font-size: 16px; }
  .item-qty-txt { color: var(--ink-soft); font-weight: 400; }
  .item-meta { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
  .person-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12px; color: var(--ink-soft);
  }
  .person-tag .dot { width: 8px; height: 8px; border-radius: 50%; }
  .item-actions { display: flex; gap: 4px; }
  .icon-btn {
    border: none; background: transparent; cursor: pointer;
    padding: 6px; border-radius: 8px; color: var(--ink-soft); font-size: 15px;
  }
  .icon-btn:hover { background: #ece6d9; color: var(--ink); }

  .empty {
    text-align: center; padding: 28px 10px; color: var(--ink-soft);
  }
  .empty .big { font-family: var(--display); font-style: italic; font-size: 20px; }

  /* History */
  .hist-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 4px; border-bottom: 1px solid #ece6d9;
    color: var(--ink-soft);
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-item .name { flex: 1; text-decoration: line-through; }
  .text-btn {
    border: none; background: transparent; color: var(--accent);
    cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .text-btn:hover { text-decoration: underline; }

  @media (max-width: 560px) {
    .brand h1 { font-size: 24px; }
    .brand img { width: 46px; height: 46px; }
    header { padding-top: 20px; }
  }

  /* ---- Foto ---- */
  .photo-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
  .photo-btn { display: inline-flex; align-items: center; gap: 7px; padding: 10px 14px; border: 1px solid var(--line); border-radius: 12px; background: #fff; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--ink); }
  .photo-btn:hover { border-color: var(--ink); }
  .photo-preview { position: relative; display: inline-block; }
  .photo-preview img { width: 54px; height: 54px; border-radius: 10px; object-fit: cover; display: block; border: 1px solid var(--line); }
  .photo-remove { position: absolute; top: -7px; right: -7px; width: 22px; height: 22px; border-radius: 50%; border: none; background: var(--accent); color: #fff; cursor: pointer; font-size: 12px; line-height: 1; display: flex; align-items: center; justify-content: center; }
  .photo-status { font-size: 13px; color: var(--ink-soft); }
  .item-thumb { width: 42px; height: 42px; min-width: 42px; border-radius: 9px; object-fit: cover; cursor: pointer; border: 1px solid var(--line); }
  .lightbox { position: fixed; inset: 0; background: rgba(0,0,0,0.82); display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 24px; }
  .lightbox img { max-width: 100%; max-height: 90vh; border-radius: 12px; }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <img src="../vardagspusslet.png" alt="Vardagspusslet" class="login-logo">
    <h1>Vardags<em>pusslet</em></h1>
    <p class="login-tagline">Inköpslistan</p>
    <div class="login-error" id="loginError"></div>
    <label for="familyCodeInput">Familjekod</label>
    <input type="text" id="familyCodeInput" placeholder="tilldelad kod" autocomplete="off" autocapitalize="none" spellcheck="false">
    <button class="btn-primary" id="loginBtn">Logga in</button>
    <p class="login-help">Har du ingen kod? Kontakta Jesper.</p>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app" class="hidden">
  <div class="wrap">
    <header>
      <div class="brand">
        <img src="../vardagspusslet.png" alt="">
        <div>
          <span class="eyebrow" id="familyNameLabel">Familjen</span>
          <h1>Vardags<em>pusslet</em></h1>
        </div>
      </div>
      <div class="header-right">
        <span class="sync-status"><span class="sync-dot" id="syncDot"></span><span id="syncText">Ansluter…</span></span>
        <a href="/Familj/" class="nav-btn"><span>📅 Kalender</span></a>
      </div>
    </header>

    <!-- Lägg till -->
    <div class="card">
      <h2 class="card-title" id="addTitle">Lägg till vara</h2>
      <div class="add-row">
        <input type="text" class="item-name" id="itemName" placeholder="t.ex. Mjölk, bananer, tandkräm…">
        <input type="text" class="item-qty" id="itemQty" placeholder="antal">
      </div>
      <div class="field-label">Kategori</div>
      <div class="cat-picker" id="catPicker"></div>
      <div class="field-label">Vem (valfritt)</div>
      <div class="person-picker" id="personPicker"></div>
      <div class="field-label">Bild (valfritt)</div>
      <div class="photo-row">
        <button type="button" class="photo-btn" id="photoBtn">📷 Lägg till bild</button>
        <input type="file" id="photoInput" accept="image/*" style="display:none">
        <div class="photo-preview hidden" id="photoPreview">
          <img id="photoPreviewImg" src="" alt="">
          <button type="button" class="photo-remove" id="photoRemove">✕</button>
        </div>
        <span class="photo-status" id="photoStatus"></span>
      </div>
      <button class="add-btn" id="addBtn">Lägg till i listan</button>
    </div>

    <!-- Att handla -->
    <div class="card">
      <h2 class="card-title">Att handla</h2>
      <div id="listContainer"></div>
    </div>

    <!-- Historik -->
    <div class="card" id="historyCard">
      <div class="hist-head">
        <h2 class="card-title" style="margin:0;">Nyligen köpt</h2>
        <button class="text-btn" id="clearHistBtn">Rensa</button>
      </div>
      <div id="historyContainer"></div>
    </div>
  </div>
</div>

<div id="lightbox" class="lightbox hidden"><img id="lightboxImg" src="" alt=""></div>

<script>
(function () {
  'use strict';

  const PERSON_KEYS = ['p1', 'p2', 'p3', 'p4', 'p5'];
  const CATEGORIES = [
    { id: 'frukt',   label: 'Frukt & grönt', icon: '🥬' },
    { id: 'mejeri',  label: 'Mejeri',        icon: '🥛' },
    { id: 'kott',    label: 'Kött & fisk',   icon: '🥩' },
    { id: 'brod',    label: 'Bröd',          icon: '🍞' },
    { id: 'fryst',   label: 'Fryst',         icon: '🧊' },
    { id: 'skafferi',label: 'Skafferi',      icon: '🥫' },
    { id: 'dryck',   label: 'Dryck',         icon: '🧃' },
    { id: 'hushall', label: 'Hushåll',       icon: '🧻' },
    { id: 'ovrigt',  label: 'Övrigt',        icon: '📦' }
  ];
  const CAT_BY_ID = Object.fromEntries(CATEGORIES.map(c => [c.id, c]));
  const LS_KEY = 'vardagspusslet_family';
  const CLOUDINARY_CLOUD = 'dtiee88h6';
  const CLOUDINARY_PRESET = 'terrazzo';

  const state = {
    familyCode: null,
    members: {},          // { p1:'Jesper', ... }
    items: {},            // { pushId: {name,qty,category,person,addedAt} }
    history: {},          // { pushId: {name,category,person,boughtAt} }
    selectedCat: 'ovrigt',
    selectedPerson: '',   // '' = ingen, annars p1..p5 eller 'familj'
    pendingPhoto: ''      // url till uppladdad bild (innan tillägg)
  };

  let itemsRef = null, historyRef = null, membersRef = null;

  // ---------- helpers ----------
  function personColor(key) {
    if (key === 'familj') return 'var(--familj)';
    return `var(--${key})`;
  }
  function personName(key) {
    if (!key) return '';
    if (key === 'familj') return 'Hela familjen';
    return state.members[key] || '';
  }
  function activePersonKeys() {
    return PERSON_KEYS.filter(k => state.members[k]);
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c =>
      ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
  }

  // ---------- LOGIN ----------
  function showLogin() {
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('app').classList.add('hidden');
  }
  function tryLogin(code) {
    code = (code || '').trim().toLowerCase();
    const err = document.getElementById('loginError');
    if (!window.FAMILIES[code]) {
      err.textContent = 'Ogiltig familjekod. Försök igen.';
      return;
    }
    err.textContent = '';
    localStorage.setItem(LS_KEY, code);
    startApp(code);
  }

  function startApp(code) {
    state.familyCode = code;
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
    const fam = window.FAMILIES[code];
    document.getElementById('familyNameLabel').textContent = fam ? fam.name : 'Familjen';

    if (!window.firebaseReady || !window.db) {
      setSync(false, 'Ingen anslutning');
      return;
    }

    membersRef = window.db.ref(`families/${code}/members`);
    itemsRef   = window.db.ref(`families/${code}/shopping/items`);
    historyRef = window.db.ref(`families/${code}/shopping/history`);

    // members (för namn/färger) — skapa default om saknas
    membersRef.once('value').then(snap => {
      if (snap.exists()) {
        state.members = snap.val();
      } else {
        const m = {};
        (fam.members || []).forEach((name, i) => {
          const k = PERSON_KEYS[i];
          if (k) m[k] = name.charAt(0).toUpperCase() + name.slice(1);
        });
        state.members = m;
        membersRef.set(m);
      }
      renderPickers();
    });
    membersRef.on('value', snap => {
      if (snap.exists()) { state.members = snap.val(); renderPickers(); renderList(); }
    });

    // realtidssynk
    itemsRef.on('value', snap => {
      state.items = snap.val() || {};
      setSync(true, 'Synkad');
      renderList();
    });
    historyRef.on('value', snap => {
      state.history = snap.val() || {};
      renderHistory();
    });

    window.db.ref('.info/connected').on('value', snap => {
      setSync(!!snap.val(), snap.val() ? 'Synkad' : 'Ansluter…');
    });
  }

  function setSync(on, text) {
    document.getElementById('syncDot').classList.toggle('on', !!on);
    document.getElementById('syncText').textContent = text;
  }

  // ---------- PICKERS ----------
  function renderPickers() {
    // kategori
    const cp = document.getElementById('catPicker');
    cp.innerHTML = CATEGORIES.map(c =>
      `<div class="chip${c.id === state.selectedCat ? ' selected' : ''}" data-cat="${c.id}">
         <span>${c.icon}</span><span>${escapeHtml(c.label)}</span></div>`).join('');
    cp.querySelectorAll('.chip').forEach(el => el.onclick = () => {
      state.selectedCat = el.dataset.cat; renderPickers();
    });

    // person
    const pp = document.getElementById('personPicker');
    let chips = `<div class="chip${state.selectedPerson === '' ? ' selected' : ''}" data-person="">Ingen</div>`;
    activePersonKeys().forEach(k => {
      chips += `<div class="chip${state.selectedPerson === k ? ' selected' : ''}" data-person="${k}">
        <span class="dot" style="background:${personColor(k)}"></span>${escapeHtml(personName(k))}</div>`;
    });
    chips += `<div class="chip${state.selectedPerson === 'familj' ? ' selected' : ''}" data-person="familj">
      <span class="dot" style="background:${personColor('familj')}"></span>Hela familjen</div>`;
    pp.innerHTML = chips;
    pp.querySelectorAll('.chip').forEach(el => el.onclick = () => {
      state.selectedPerson = el.dataset.person; renderPickers();
    });
  }

  // ---------- ITEMS ----------
  function addItem() {
    const nameEl = document.getElementById('itemName');
    const qtyEl = document.getElementById('itemQty');
    const name = nameEl.value.trim();
    if (!name) { nameEl.focus(); return; }
    if (!itemsRef) return;
    itemsRef.push({
      name: name,
      qty: qtyEl.value.trim(),
      category: state.selectedCat,
      person: state.selectedPerson,
      photo: state.pendingPhoto || '',
      addedAt: Date.now()
    });
    nameEl.value = '';
    qtyEl.value = '';
    clearPendingPhoto();
    nameEl.focus();
  }

  function markBought(id, item) {
    if (!itemsRef || !historyRef) return;
    historyRef.push({
      name: item.name, qty: item.qty || '', category: item.category || 'ovrigt',
      person: item.person || '', boughtAt: Date.now()
    });
    itemsRef.child(id).remove();
  }

  function editItem(id, item) {
    const nytt = prompt('Ändra vara:', item.name);
    if (nytt === null) return;
    const namn = nytt.trim();
    if (!namn) return;
    itemsRef.child(id).update({ name: namn });
  }

  function deleteItem(id) {
    if (itemsRef) itemsRef.child(id).remove();
  }

  function restoreItem(id, h) {
    if (!itemsRef || !historyRef) return;
    itemsRef.push({
      name: h.name, qty: h.qty || '', category: h.category || 'ovrigt',
      person: h.person || '', addedAt: Date.now()
    });
    historyRef.child(id).remove();
  }

  function clearHistory() {
    if (!historyRef) return;
    if (confirm('Rensa hela köp-historiken?')) historyRef.set(null);
  }

  // ---------- RENDER ----------
  function renderList() {
    const c = document.getElementById('listContainer');
    const entries = Object.entries(state.items);
    if (entries.length === 0) {
      c.innerHTML = `<div class="empty"><div class="big">Inget på listan ännu</div>
        <div>Lägg till det första du behöver handla.</div></div>`;
      return;
    }
    // gruppera per kategori, i CATEGORIES-ordning
    const groups = {};
    entries.forEach(([id, it]) => {
      const cat = CAT_BY_ID[it.category] ? it.category : 'ovrigt';
      (groups[cat] = groups[cat] || []).push([id, it]);
    });
    let html = '';
    CATEGORIES.forEach(cat => {
      const g = groups[cat.id];
      if (!g) return;
      g.sort((a, b) => (a[1].addedAt || 0) - (b[1].addedAt || 0));
      html += `<div class="cat-group"><div class="cat-head"><span>${cat.icon}</span><span>${escapeHtml(cat.label)}</span></div>`;
      g.forEach(([id, it]) => {
        const pkey = it.person || '';
        const tag = pkey ? `<span class="person-tag"><span class="dot" style="background:${personColor(pkey)}"></span>${escapeHtml(personName(pkey))}</span>` : '';
        const qty = it.qty ? ` <span class="item-qty-txt">· ${escapeHtml(it.qty)}</span>` : '';
        const thumb = it.photo ? `<img class="item-thumb" src="${it.photo}" data-act="zoom" alt="bild">` : '';
        html += `<div class="item" data-id="${id}">
          <div class="check" data-act="buy" title="Markera köpt"></div>
          ${thumb}
          <div class="item-main">
            <div class="item-name-txt">${escapeHtml(it.name)}${qty}</div>
            ${tag ? `<div class="item-meta">${tag}</div>` : ''}
          </div>
          <div class="item-actions">
            <button class="icon-btn" data-act="photo" title="Lägg till/byt bild">📷</button>
            <button class="icon-btn" data-act="edit" title="Ändra">✏️</button>
            <button class="icon-btn" data-act="del" title="Ta bort">✕</button>
          </div>
        </div>`;
      });
      html += `</div>`;
    });
    c.innerHTML = html;

    c.querySelectorAll('.item').forEach(row => {
      const id = row.dataset.id;
      const it = state.items[id];
      if (!it) return;
      row.querySelector('[data-act="buy"]').onclick = () => markBought(id, it);
      row.querySelector('[data-act="edit"]').onclick = () => editItem(id, it);
      row.querySelector('[data-act="del"]').onclick = () => deleteItem(id);
      row.querySelector('[data-act="photo"]').onclick = () => addPhotoToItem(id);
      const zoomEl = row.querySelector('[data-act="zoom"]');
      if (zoomEl) zoomEl.onclick = () => openLightbox(it.photo);
    });
  }

  function renderHistory() {
    const c = document.getElementById('historyContainer');
    const card = document.getElementById('historyCard');
    let entries = Object.entries(state.history);
    if (entries.length === 0) { card.classList.add('hidden'); return; }
    card.classList.remove('hidden');
    entries.sort((a, b) => (b[1].boughtAt || 0) - (a[1].boughtAt || 0));
    entries = entries.slice(0, 30);
    c.innerHTML = entries.map(([id, h]) => {
      const qty = h.qty ? ` · ${escapeHtml(h.qty)}` : '';
      return `<div class="hist-item" data-id="${id}">
        <span class="name">${escapeHtml(h.name)}${qty}</span>
        <button class="text-btn" data-act="restore">↩ Tillbaka</button>
      </div>`;
    }).join('');
    c.querySelectorAll('.hist-item').forEach(row => {
      const id = row.dataset.id;
      const h = state.history[id];
      if (!h) return;
      row.querySelector('[data-act="restore"]').onclick = () => restoreItem(id, h);
    });
  }

  // ---------- FOTO ----------
  function resizeImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const url = URL.createObjectURL(file);
      img.onload = () => {
        URL.revokeObjectURL(url);
        let w = img.width, h = img.height;
        if (w > maxDim || h > maxDim) {
          if (w >= h) { h = Math.round(h * maxDim / w); w = maxDim; }
          else { w = Math.round(w * maxDim / h); h = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('toBlob')), 'image/jpeg', quality);
      };
      img.onerror = () => { URL.revokeObjectURL(url); reject(new Error('img')); };
      img.src = url;
    });
  }

  async function uploadPhoto(file, statusEl) {
    if (statusEl) statusEl.textContent = 'Laddar upp\u2026';
    try {
      let blob = file;
      try { blob = await resizeImage(file, 1200, 0.85); } catch (e) {}
      const fd = new FormData();
      fd.append('file', blob);
      fd.append('upload_preset', CLOUDINARY_PRESET);
      const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD}/image/upload`, { method: 'POST', body: fd });
      if (!res.ok) throw new Error('Cloudinary ' + res.status);
      const data = await res.json();
      if (statusEl) statusEl.textContent = '';
      return data.secure_url;
    } catch (e) {
      console.error('Foto-uppladdning misslyckades', e);
      if (statusEl) statusEl.textContent = 'Uppladdning misslyckades \u2013 f\u00f6rs\u00f6k igen';
      return null;
    }
  }

  function clearPendingPhoto() {
    state.pendingPhoto = '';
    const prev = document.getElementById('photoPreview');
    if (prev) prev.classList.add('hidden');
    const status = document.getElementById('photoStatus');
    if (status) status.textContent = '';
    const inp = document.getElementById('photoInput');
    if (inp) inp.value = '';
  }

  async function handleFormPhoto(file) {
    const url = await uploadPhoto(file, document.getElementById('photoStatus'));
    if (!url) return;
    state.pendingPhoto = url;
    document.getElementById('photoPreviewImg').src = url;
    document.getElementById('photoPreview').classList.remove('hidden');
  }

  function addPhotoToItem(id) {
    const inp = document.createElement('input');
    inp.type = 'file';
    inp.accept = 'image/*';
    inp.onchange = async () => {
      if (!inp.files || !inp.files[0]) return;
      const url = await uploadPhoto(inp.files[0], null);
      if (url && itemsRef) itemsRef.child(id).update({ photo: url });
    };
    inp.click();
  }

  function openLightbox(url) {
    if (!url) return;
    document.getElementById('lightboxImg').src = url;
    document.getElementById('lightbox').classList.remove('hidden');
  }
  function closeLightbox() {
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightboxImg').src = '';
  }

  // ---------- INIT ----------
  document.getElementById('loginBtn').onclick = () =>
    tryLogin(document.getElementById('familyCodeInput').value);
  document.getElementById('familyCodeInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') tryLogin(e.target.value);
  });
  document.getElementById('addBtn').onclick = addItem;
  document.getElementById('itemName').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('itemQty').addEventListener('keydown', e => {
    if (e.key === 'Enter') addItem();
  });
  document.getElementById('clearHistBtn').onclick = clearHistory;
  document.getElementById('photoBtn').onclick = () => document.getElementById('photoInput').click();
  document.getElementById('photoInput').addEventListener('change', e => {
    if (e.target.files && e.target.files[0]) handleFormPhoto(e.target.files[0]);
  });
  document.getElementById('photoRemove').onclick = clearPendingPhoto;
  document.getElementById('lightbox').onclick = closeLightbox;

  // auto-login via delad localStorage-nyckel
  const saved = localStorage.getItem(LS_KEY);
  if (saved && window.FAMILIES[saved]) {
    startApp(saved);
  } else {
    showLogin();
    document.getElementById('familyCodeInput').focus();
  }
})();
</script>
</body>
</html>
