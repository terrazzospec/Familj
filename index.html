<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Familjen Reis">
<meta name="theme-color" content="#f4efe6">
<title>Familjen Reis – Planering</title>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
  function initFirebase() {
    if (typeof firebase === 'undefined') {
      console.error('Firebase failed to load');
      window.firebaseFailed = true;
      return;
    }
    const firebaseConfig = {
      apiKey: "AIzaSyBGEXGTew8kXBixMQlEhvyljvMQUBiqOL0",
      authDomain: "familjekalender-reis.firebaseapp.com",
      databaseURL: "https://familjekalender-reis-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "familjekalender-reis",
      storageBucket: "familjekalender-reis.firebasestorage.app",
      messagingSenderId: "197443174169",
      appId: "1:197443174169:web:3c0731c8b267f2b019cf88"
    };
    try {
      firebase.initializeApp(firebaseConfig);
      window.db = firebase.database();
      window.firebaseReady = true;
    } catch (e) {
      console.error('Firebase init failed', e);
      window.firebaseFailed = true;
    }
  }
  initFirebase();
</script>
</head>
<body>
<div style="font-family: -apple-system, sans-serif; padding: 40px; text-align: center;">
  <h1>Test - laddas...</h1>
  <p>Om du ser detta så funkar grundsidan!</p>
  <p>Synkstatus: <span id="status">Kontrollerar...</span></p>
</div>
<script>
  setTimeout(() => {
    const s = document.getElementById('status');
    if (window.firebaseReady) {
      s.textContent = '✅ Firebase fungerar! Vi kan fortsätta med nästa steg.';
      s.style.color = 'green';
    } else if (window.firebaseFailed) {
      s.textContent = '❌ Firebase laddades INTE';
      s.style.color = 'red';
    } else {
      s.textContent = '⏳ Väntar fortfarande...';
    }
  }, 2000);
</script>
</body>
</html>
